<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oscar Chinchilla · B2B Closer</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#040810;
  color:#fff;
}

a{text-decoration:none;color:inherit}

/* ===== NAV ===== */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,.7);
  z-index:999;
}

.nav-cta{
  background:#00ff88;
  color:#000;
  padding:10px 20px;
  border-radius:6px;
  font-weight:700;
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:60px;
  margin-bottom:20px;
}

.hero em{color:#00ff88;font-style:normal}

.btn{
  background:#00ff88;
  color:#000;
  padding:15px 30px;
  border-radius:6px;
  margin-top:20px;
  display:inline-block;
  font-weight:700;
  transition:.2s;
}
.btn:hover{transform:translateY(-3px)}

/* ===== KPI ===== */
.kpi{
  display:flex;
  justify-content:center;
  gap:40px;
  padding:80px 20px;
}

.kpi div{
  text-align:center;
}

.kpi span{
  font-size:40px;
  color:#00ff88;
}

/* ===== CHART ===== */
.chart{
  max-width:700px;
  margin:0 auto;
}

/* ===== STICKY CTA ===== */
.sticky{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}

.sticky a{
  background:#00ff88;
  color:#000;
  padding:14px 30px;
  border-radius:6px;
  font-weight:800;
}

/* ===== ANIM ===== */
.fade{
  opacity:0;
  transform:translateY(30px);
  transition:.6s;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<nav>
  <div>ABRAXAS</div>
  <a href="#agenda" class="nav-cta">Agendar</a>
</nav>

<section class="hero">
  <h1>ESTÁS PERDIENDO <em>CLIENTES</em></h1>
  <p>Escalé negocios de 450K a +2M USD</p>
  <a href="#agenda" class="btn">Agendar llamada</a>
</section>

<section class="kpi fade">
  <div>
    <span class="counter" data-target="450">0</span>K
    <p>Inicial</p>
  </div>
  <div>
    <span class="counter" data-target="2.2">0</span>M
    <p>Máximo</p>
  </div>
  <div>
    <span class="counter" data-target="151">0</span>%
    <p>Crecimiento</p>
  </div>
</section>

<section class="chart fade">
  <canvas id="chart"></canvas>
</section>

<section id="agenda" class="fade" style="padding:100px;text-align:center;">
  <h2>Agendá tu llamada</h2>
  <iframe src="https://zcal.co/i/zz08011230e63ab5a00510cc1ee142357c802f7f5c047f41a6eef04fbec3db2110265d2716d391be83f192715b715199f069628b4c?embed=1"
  style="width:100%;height:500px;border:none"></iframe>
</section>

<div class="sticky">
  <a href="#">WhatsApp</a>
</div>

<!-- ================= JS ================= -->

<script>

// ===== ANIMACIONES =====
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

document.querySelectorAll('.fade').forEach(el=>observer.observe(el));


// ===== COUNTER =====
const counters = document.querySelectorAll('.counter');

function runCounter(counter){
  const target = parseFloat(counter.dataset.target);
  let count = 0;
  const step = target / 60;

  function update(){
    count += step;
    if(count < target){
      counter.innerText = count.toFixed(1);
      requestAnimationFrame(update);
    }else{
      counter.innerText = target;
    }
  }

  update();
}

counters.forEach(c=>runCounter(c));


// ===== CHART =====
new Chart(document.getElementById('chart'), {
  type:'line',
  data:{
    labels:['Año 1','Año 2','Año 3'],
    datasets:[{
      data:[0.45,1.2,2.2],
      borderWidth:2
    }]
  }
});


// ===== WHATSAPP =====
document.querySelector('.sticky a').onclick = ()=>{
  window.open("https://wa.me/5493417400299?text=Hola%20quiero%20mejorar%20mis%20ventas");
};

</script>

</body>
</html>
